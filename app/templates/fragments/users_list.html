<div class="p-6 md:p-8 space-y-6"
     x-data="{ editModalOpen: false }"
     @user-updated.window="editModalOpen = false; hxTriggerUsersRefresh()">

    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
        <div>
            <h1 class="text-2xl font-bold text-slate-100">User Directory</h1>
            <p class="text-xs text-slate-400 mt-1">Manage accounts, verify status, and assign user access permissions.</p>
        </div>
    </div>

    <!-- Search + Filter Controls -->
    <div class="p-4 rounded-xl bg-slate-900 border border-slate-800/80 flex flex-col sm:flex-row items-center gap-4 justify-between">
        <div class="relative w-full sm:max-w-xs">
            <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-500">
                <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            </span>
            <input type="text" id="search-input" name="search" placeholder="Search by name, email..." value="{{ search }}"
                   hx-get="/dashboard/users"
                   hx-trigger="keyup changed delay:300ms, search"
                   hx-target="#users-table"
                   hx-include="#role-filter, #sort-select"
                   hx-push-url="true"
                   hx-sync="this:replace"
                   hx-indicator="#search-indicator"
                   class="w-full bg-slate-950 border border-slate-800/80 rounded-lg pl-10 pr-4 py-2 text-xs text-slate-100 placeholder-slate-500 focus:outline-none focus:border-brand-500">
            <span id="search-indicator" class="htmx-indicator absolute right-3 top-2.5">
                <svg class="animate-spin h-4 w-4 text-brand-500" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
            </span>
        </div>

        <div class="flex items-center gap-3 w-full sm:w-auto">
            <select id="role-filter" name="role"
                    hx-get="/dashboard/users"
                    hx-trigger="change"
                    hx-target="#users-table"
                    hx-include="#search-input, #sort-select"
                    hx-push-url="true"
                    hx-sync="#search-input:replace"
                    class="bg-slate-950 border border-slate-800/80 rounded-lg px-3 py-2 text-xs text-slate-300 focus:outline-none focus:border-brand-500 w-full sm:w-auto">
                <option value="">All Roles</option>
                <option value="user" {% if role == 'user' %}selected{% endif %}>User</option>
                <option value="admin" {% if role == 'admin' %}selected{% endif %}>Admin</option>
            </select>

            <select id="sort-select" name="sort_by"
                    hx-get="/dashboard/users"
                    hx-trigger="change"
                    hx-target="#users-table"
                    hx-include="#search-input, #role-filter"
                    hx-push-url="true"
                    hx-sync="#search-input:replace"
                    class="bg-slate-950 border border-slate-800/80 rounded-lg px-3 py-2 text-xs text-slate-300 focus:outline-none focus:border-brand-500 w-full sm:w-auto">
                <option value="created_at" {% if sort_by == 'created_at' %}selected{% endif %}>Sort: Created At</option>
                <option value="email" {% if sort_by == 'email' %}selected{% endif %}>Sort: Email</option>
                <option value="full_name" {% if sort_by == 'full_name' %}selected{% endif %}>Sort: Name</option>
            </select>
        </div>
    </div>

    <!-- Table Container -->
    <div id="users-table"
         class="overflow-x-auto rounded-xl border border-slate-800/60 bg-slate-900/40"
         aria-live="polite" aria-atomic="true">
        {% include "fragments/users_table.html" %}
    </div>

    <!-- Edit Modal (scoped to this fragment's Alpine state) -->
    <div x-show="editModalOpen" class="fixed inset-0 z-50 flex items-center justify-center p-4" style="display: none;">
        <div class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm" @click="editModalOpen = false"></div>
        <div class="bg-slate-900 border border-slate-800 p-6 rounded-2xl max-w-md w-full z-10" id="modal-container">
            <!-- Loaded by HTMX -->
        </div>
    </div>
</div>

<script>
    function hxTriggerUsersRefresh() {
        const input = document.getElementById('search-input');
        if (input) htmx.trigger(input, 'search');
    }

    document.body.addEventListener('userUpdated', () => {
        window.dispatchEvent(new CustomEvent('toast', {
            detail: { message: 'User updated successfully!', type: 'success' }
        }));
        hxTriggerUsersRefresh();
    });
</script>
