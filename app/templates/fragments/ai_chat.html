<div class="flex flex-col h-full relative bg-slate-950/40">
    <div class="absolute inset-0 -z-10 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-indigo-950/10 via-slate-950 to-slate-950 pointer-events-none"></div>

    <!-- Messages Window -->
    <div id="chat-window" class="flex-1 overflow-y-auto p-6 md:p-8 space-y-6 flex flex-col justify-start">
        <!-- Empty State -->
        <div class="max-w-2xl mx-auto text-center py-12 space-y-4" id="empty-chat-state">
            <div class="h-14 w-14 rounded-2xl bg-brand-500/10 border border-brand-500/30 text-brand-400 flex items-center justify-center mx-auto shadow-lg shadow-brand-500/5">
                <svg class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
            </div>
            <div>
                <h2 class="text-xl font-bold text-slate-200">Say Hello to QualityHub AI</h2>
                <p class="text-xs text-slate-400 mt-1 max-w-md mx-auto">Ask questions about your tech stack, system specifications, or run a RAG search over seeded repository logs.</p>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 pt-6 max-w-lg mx-auto">
                <button onclick="fillPrompt('Explain FastAPI framework benefits.')"
                        class="p-3 bg-slate-900 hover:bg-slate-800/80 border border-slate-800 rounded-xl text-left text-xs text-slate-300 transition-colors">
                    "Explain FastAPI framework benefits"
                </button>
                <button onclick="fillPrompt('What is HTMX used for?')"
                        class="p-3 bg-slate-900 hover:bg-slate-800/80 border border-slate-800 rounded-xl text-left text-xs text-slate-300 transition-colors">
                    "What is HTMX used for?"
                </button>
            </div>
        </div>

        <!-- Messages Feed -->
        <div id="chat-messages" class="space-y-6 max-w-3xl w-full mx-auto"></div>
    </div>

    <!-- Input Panel -->
    <div class="p-6 border-t border-slate-800/80 bg-slate-900/20 backdrop-blur-md shrink-0">
        <div class="max-w-3xl w-full mx-auto relative">
            <form hx-post="/dashboard/ai/chat"
                  hx-target="#chat-messages"
                  hx-swap="beforeend"
                  hx-indicator="#chat-indicator"
                  hx-disabled-elt="#chat-submit, #chat-input"
                  hx-on::after-request="document.getElementById('chat-input').value = ''; document.getElementById('empty-chat-state').style.display = 'none'; scrollChatDown();"
                  class="flex items-center gap-3">
                <input type="text" id="chat-input" name="prompt" required
                       placeholder="Type a message, ask about FastAPI, Podman, HTMX..."
                       class="w-full bg-slate-950 border border-slate-800/80 rounded-xl pl-4 pr-20 py-3.5 text-xs text-slate-200 focus:outline-none focus:border-brand-500 disabled:opacity-60 disabled:cursor-not-allowed">

                <span id="chat-indicator" class="htmx-indicator absolute right-12 top-3.5">
                    <svg class="animate-spin h-4 w-4 text-brand-400" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                    </svg>
                </span>

                <button type="submit" id="chat-submit"
                        class="absolute right-2 top-2 p-2 bg-brand-600 hover:bg-brand-500 text-white rounded-lg shadow shadow-brand-600/25 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                    <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
                </button>
            </form>
        </div>
    </div>
</div>

<script>
    function fillPrompt(text) {
        const input = document.getElementById('chat-input');
        if (input) { input.value = text; input.focus(); }
    }
    function scrollChatDown() {
        setTimeout(() => {
            const w = document.getElementById('chat-window');
            if (w) w.scrollTop = w.scrollHeight;
        }, 100);
    }
</script>
