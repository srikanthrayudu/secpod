{% extends "layouts/base.html" %}

{% block content %}
<div class="min-h-screen flex items-center justify-center relative overflow-hidden bg-slate-950 px-4">
    <!-- Ambient glow accents -->
    <div class="absolute -top-40 -left-40 w-96 h-96 bg-brand-600/20 rounded-full blur-[128px] pointer-events-none"></div>
    <div class="absolute -bottom-40 -right-40 w-96 h-96 bg-fuchsia-600/20 rounded-full blur-[128px] pointer-events-none"></div>

    <div class="w-full max-w-md z-10">
        <!-- Logo -->
        <div class="text-center mb-8">
            <a href="/login" class="inline-block">
                <h1 class="text-4xl font-extrabold tracking-tight bg-gradient-to-r from-brand-400 via-fuchsia-400 to-indigo-400 bg-clip-text text-transparent">
                    QualityHub
                </h1>
            </a>
            <p class="mt-2 text-sm text-slate-400">SecPod QA Test Management Platform</p>
        </div>

        <!-- Card -->
        <div class="bg-slate-900/60 border border-slate-800/80 backdrop-blur-xl p-8 rounded-2xl shadow-2xl">
            {% block auth_content %}{% endblock %}
        </div>
    </div>
</div>
{% endblock %}
