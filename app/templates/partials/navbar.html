<header class="bg-slate-900 border-b border-slate-800/80 px-6 py-4 flex items-center justify-between z-20 shrink-0">
    <div class="flex items-center gap-4">
        <!-- Mobile menu toggle -->
        <button class="md:hidden text-slate-400 hover:text-slate-200 transition-colors" @click="mobileMenuOpen = !mobileMenuOpen">
            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>

        <!-- Brand (mobile only) -->
        <a href="/dashboard"
           hx-get="/dashboard" hx-target="#main-content" hx-swap="innerHTML" hx-push-url="true"
           class="md:hidden text-lg font-extrabold bg-gradient-to-r from-brand-400 via-fuchsia-400 to-indigo-400 bg-clip-text text-transparent">
            QualityHub
        </a>
    </div>

    <div class="flex items-center gap-4">
        <!-- Environment badge -->
        <span class="hidden sm:inline-flex px-2.5 py-1 text-[11px] font-semibold rounded-md border text-slate-400 border-slate-800 bg-slate-950">
            Dev Server (SQLite)
        </span>

        <div class="h-8 w-px bg-slate-800"></div>

        <!-- Profile dropdown -->
        <div class="relative" x-data="{ open: false }" @keydown.escape.window="open = false" @click.outside="open = false">
            <button @click="open = !open"
                    class="flex items-center gap-3 rounded-xl px-2 py-1.5 hover:bg-slate-800/60 transition-colors focus:outline-none focus-visible:ring-2 focus-visible:ring-brand-500">
                <div class="text-right hidden sm:block">
                    <span class="block text-xs font-semibold text-slate-300">{{ user.full_name or "Anonymous" }}</span>
                    <span class="block text-[10px] text-slate-500 uppercase tracking-widest">{{ user.role }}</span>
                </div>
                <div class="h-8 w-8 rounded-full bg-brand-600/30 border border-brand-500/20 flex items-center justify-center font-bold text-brand-300 shrink-0">
                    {{ user.full_name[0] | upper if user.full_name else user.email[0] | upper }}
                </div>
                <svg class="h-4 w-4 text-slate-500 transition-transform duration-200" :class="open ? 'rotate-180' : ''" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                </svg>
            </button>

            <div x-show="open"
                 x-transition:enter="transition ease-out duration-150"
                 x-transition:enter-start="opacity-0 scale-95 -translate-y-1"
                 x-transition:enter-end="opacity-100 scale-100 translate-y-0"
                 x-transition:leave="transition ease-in duration-100"
                 x-transition:leave-start="opacity-100 scale-100 translate-y-0"
                 x-transition:leave-end="opacity-0 scale-95 -translate-y-1"
                 class="absolute right-0 mt-2 w-52 rounded-xl border border-slate-700/60 bg-slate-900/95 backdrop-blur-md shadow-xl z-50 py-1 origin-top-right">

                <div class="px-4 py-3 border-b border-slate-800">
                    <p class="text-xs font-semibold text-slate-200 truncate">{{ user.full_name or "Anonymous" }}</p>
                    <p class="text-[10px] text-slate-500 truncate mt-0.5">{{ user.email }}</p>
                </div>

                <div class="py-1">
                    <a href="/dashboard/profile"
                       hx-get="/dashboard/profile" hx-target="#main-content" hx-swap="innerHTML" hx-push-url="true"
                       @click="open = false"
                       class="flex items-center gap-3 px-4 py-2 text-sm text-slate-300 hover:text-slate-100 hover:bg-slate-800/60 transition-colors">
                        <svg class="h-4 w-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                        </svg>
                        My Profile
                    </a>
                </div>

                <div class="py-1 border-t border-slate-800">
                    <a href="/logout"
                       class="flex items-center gap-3 px-4 py-2 text-sm text-rose-400 hover:text-rose-300 hover:bg-rose-950/30 transition-colors">
                        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                        </svg>
                        Log Out
                    </a>
                </div>
            </div>
        </div>
    </div>
</header>
