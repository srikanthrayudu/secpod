<aside class="w-64 bg-slate-900 border-r border-slate-800/80 flex flex-col justify-between h-screen sticky top-0 hidden md:flex shrink-0">
    <div class="p-6">
        <!-- Logo / Brand -->
        <a href="/dashboard" class="flex items-center gap-3 mb-8">
            <span class="text-2xl font-extrabold tracking-tight bg-gradient-to-r from-brand-400 via-fuchsia-400 to-indigo-400 bg-clip-text text-transparent">
                QualityHub
            </span>
            <span class="px-2 py-0.5 text-[10px] font-bold tracking-widest text-brand-300 border border-brand-500/30 rounded-full uppercase bg-brand-950/40">
                v0.1
            </span>
        </a>

        <!-- Navigation Links -->
        <nav class="space-y-1.5">
            <a href="/dashboard" 
               class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold transition-all duration-200 {% if active_tab == 'dashboard' %} bg-brand-500/10 border-l-2 border-brand-500 text-brand-300 {% else %} text-slate-400 hover:text-slate-200 hover:bg-slate-800/50 {% endif %}">
                <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                Overview
            </a>

            <a href="/dashboard/releases" 
               class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold transition-all duration-200 {% if active_tab == 'releases' %} bg-brand-500/10 border-l-2 border-brand-500 text-brand-300 {% else %} text-slate-400 hover:text-slate-200 hover:bg-slate-800/50 {% endif %}">
                <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
                Releases
            </a>

            <a href="/dashboard/test-cases" 
               class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold transition-all duration-200 {% if active_tab == 'test_cases' %} bg-brand-500/10 border-l-2 border-brand-500 text-brand-300 {% else %} text-slate-400 hover:text-slate-200 hover:bg-slate-800/50 {% endif %}">
                <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                Test Cases
            </a>

            <a href="/dashboard/test-runs" 
               class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold transition-all duration-200 {% if active_tab == 'test_runs' %} bg-brand-500/10 border-l-2 border-brand-500 text-brand-300 {% else %} text-slate-400 hover:text-slate-200 hover:bg-slate-800/50 {% endif %}">
                <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                Test Runs
            </a>

            <a href="/dashboard/defects" 
               class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold transition-all duration-200 {% if active_tab == 'defects' %} bg-brand-500/10 border-l-2 border-brand-500 text-brand-300 {% else %} text-slate-400 hover:text-slate-200 hover:bg-slate-800/50 {% endif %}">
                <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"/></svg>
                Defects
            </a>

            <a href="/dashboard/ai" 
               class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold transition-all duration-200 {% if active_tab == 'ai' %} bg-brand-500/10 border-l-2 border-brand-500 text-brand-300 {% else %} text-slate-400 hover:text-slate-200 hover:bg-slate-800/50 {% endif %}">
                <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                AI Playground
            </a>

            {% if user.role == 'admin' %}
            <a href="/dashboard/users" 
               class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold transition-all duration-200 {% if active_tab == 'users' %} bg-brand-500/10 border-l-2 border-brand-500 text-brand-300 {% else %} text-slate-400 hover:text-slate-200 hover:bg-slate-800/50 {% endif %}">
                <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                Users Admin
            </a>
            {% endif %}

            <a href="/dashboard/profile" 
               class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold transition-all duration-200 {% if active_tab == 'profile' %} bg-brand-500/10 border-l-2 border-brand-500 text-brand-300 {% else %} text-slate-400 hover:text-slate-200 hover:bg-slate-800/50 {% endif %}">
                <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                My Profile
            </a>
        </nav>
    </div>

    <!-- User Profile Footer summary -->
    <div class="p-4 border-t border-slate-800/80 bg-slate-950/40">
        <div class="flex items-center justify-between gap-3">
            <div class="flex items-center gap-2 overflow-hidden">
                <div class="h-9 w-9 rounded-full bg-brand-600/30 flex items-center justify-center text-brand-300 font-bold shrink-0 border border-brand-500/20">
                    {{ user.full_name[0] | upper if user.full_name else user.email[0] | upper }}
                </div>
                <div class="overflow-hidden">
                    <p class="text-xs font-semibold text-slate-200 truncate">{{ user.full_name or "Anonymous" }}</p>
                    <p class="text-[10px] text-slate-500 truncate">{{ user.email }}</p>
                </div>
            </div>
            <a href="/logout" class="p-1.5 rounded-lg text-slate-500 hover:text-rose-400 hover:bg-rose-950/20 transition-colors" title="Log Out">
                <svg class="h-4.5 w-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
            </a>
        </div>
    </div>
</aside>
