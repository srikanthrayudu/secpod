<!-- Stat Card 1 -->
<div class="p-5 rounded-2xl bg-slate-900 border border-slate-800/60 shadow-md" id="total-users-stat" hx-swap-oob="true">
    <div class="flex items-center justify-between text-slate-500">
        <span class="text-xs font-semibold uppercase tracking-wider">Database Accounts</span>
        <svg class="h-5 w-5 text-brand-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
    </div>
    <p class="mt-3 text-3xl font-bold tracking-tight">{{ stats.total_users }}</p>
    <span class="block mt-1 text-[10px] text-emerald-400 font-medium">Active in database</span>
</div>

<!-- Stat Card 2 -->
<div class="p-5 rounded-2xl bg-slate-900 border border-slate-800/60 shadow-md" id="ai-queries-stat" hx-swap-oob="true">
    <div class="flex items-center justify-between text-slate-500">
        <span class="text-xs font-semibold uppercase tracking-wider">AI Operations</span>
        <svg class="h-5 w-5 text-fuchsia-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
    </div>
    <p class="mt-3 text-3xl font-bold tracking-tight">{{ stats.ai_queries }}</p>
    <span class="block mt-1 text-[10px] text-brand-400 font-medium">Model: {{ settings.LLM_MODEL }}</span>
</div>

<!-- Stat Card 3 -->
<div class="p-5 rounded-2xl bg-slate-900 border border-slate-800/60 shadow-md" id="redis-cache-stat" hx-swap-oob="true">
    <div class="flex items-center justify-between text-slate-500">
        <span class="text-xs font-semibold uppercase tracking-wider">Redis Cache</span>
        <svg class="h-5 w-5 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4"/></svg>
    </div>
    <p class="mt-3 text-3xl font-bold tracking-tight">Enabled</p>
    <span class="block mt-1 text-[10px] text-slate-500 font-medium">Health checks active</span>
</div>

<!-- Stat Card 4 -->
<div class="p-5 rounded-2xl bg-slate-900 border border-slate-800/60 shadow-md" id="environment-stat" hx-swap-oob="true">
    <div class="flex items-center justify-between text-slate-500">
        <span class="text-xs font-semibold uppercase tracking-wider">Environment</span>
        <svg class="h-5 w-5 text-amber-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"/></svg>
    </div>
    <p class="mt-3 text-3xl font-bold tracking-tight text-brand-300">SQLite DB</p>
    <span class="block mt-1 text-[10px] text-slate-500 font-medium">Fast local hot reloading</span>
</div>
