<div class="bg-slate-900 border border-slate-800/60 rounded-2xl p-5">
    <h2 class="text-sm font-bold text-slate-200 mb-3">{{ module_name }} — Module Drill-down</h2>
    <div class="grid grid-cols-+2 md:grid-cols-4 gap-4 mb-4">
        <div>
            <p class="text-xs text-slate-500">Coverage</p>
            <p class="text-2xl font-bold text-brand-300">{{ coverage.summary.coverage_percentage }}%</p>
        </div>
        <div>
            <p class="text-xs text-slate-500">Pass Rate</p>
            <p class="text-2xl font-bold text-emerald-300">{{ coverage.summary.pass_rate_percentage }}%</p>
        </div>
        <div>
            <p class="text-xs text-slate-500">Manual</p>
            <p class="text-2xl font-bold">{{ coverage.summary.manual_runs }}</p>
        </div>
        <div>
            <p class="text-xs text-slate-500">Automated</p>
            <p class="text-2xl font-bold">{{ coverage.summary.automated_runs }}</p>
        </div>
    </div>
    <a href="/dashboard/coverage" class="text-xs text-brand-400 hover:text-brand-300">← Back to coverage dashboard</a>
</div>
