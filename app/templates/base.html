<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-950 text-slate-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ title or "QualityHub" }}{% endblock %}</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- AlpineJS (for UI interactions) -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    
    <!-- Tailwind CSS with custom theme configurations -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f5f3ff',
                            100: '#ede9fe',
                            200: '#ddd6fe',
                            300: '#c084fc',
                            400: '#a855f7',
                            500: '#8b5cf6',
                            600: '#7c3aed',
                            700: '#6d28d9',
                            800: '#5b21b6',
                            900: '#4c1d95',
                            950: '#0c0714',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Glassmorphism scrollbars */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.6);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(124, 58, 237, 0.4);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(124, 58, 237, 0.6);
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="h-full flex flex-col font-sans" x-data="{ toasts: [] }" @toast.window="toasts.push({ id: Date.now(), message: $event.detail.message, type: $event.detail.type || 'info' })">
    
    <!-- Toast notifications manager -->
    <div class="fixed bottom-4 right-4 z-50 flex flex-col gap-2 pointer-events-none max-w-sm w-full">
        <template x-for="toast in toasts" :key="toast.id">
            <div x-data="{ show: false }" 
                 x-init="setTimeout(() => show = true, 50); setTimeout(() => { show = false; setTimeout(() => toasts = toasts.filter(t => t.id !== toast.id), 300) }, 4000)"
                 x-show="show"
                 x-transition:enter="transition ease-out duration-300 transform"
                 x-transition:enter-start="translate-y-2 opacity-0 scale-95"
                 x-transition:enter-end="translate-y-0 opacity-100 scale-100"
                 x-transition:leave="transition ease-in duration-200 transform"
                 x-transition:leave-start="opacity-100 scale-100"
                 x-transition:leave-end="opacity-0 scale-95"
                 class="p-4 rounded-xl border shadow-xl pointer-events-auto backdrop-blur-md flex items-center justify-between"
                 :class="{
                     'bg-emerald-950/80 border-emerald-500/30 text-emerald-200': toast.type === 'success',
                     'bg-rose-950/80 border-rose-500/30 text-rose-200': toast.type === 'error',
                     'bg-brand-950/80 border-brand-500/30 text-brand-200': toast.type === 'info'
                 }">
                <div class="flex items-center gap-3">
                    <template x-if="toast.type === 'success'">
                        <svg class="h-5 w-5 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    </template>
                    <template x-if="toast.type === 'error'">
                        <svg class="h-5 w-5 text-rose-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    </template>
                    <template x-if="toast.type === 'info'">
                        <svg class="h-5 w-5 text-brand-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    </template>
                    <span class="text-sm font-medium" x-text="toast.message"></span>
                </div>
                <button @click="show = false; setTimeout(() => toasts = toasts.filter(t => t.id !== toast.id), 300)" class="ml-4 hover:opacity-80 transition-opacity">
                    <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
        </template>
    </div>

    <!-- Main Content Root -->
    {% block content %}{% endblock %}

    <!-- Trigger Toast Helper via HTMX Event Listeners -->
    <script>
        document.body.addEventListener('htmx:configRequest', (event) => {
            // Include token dynamically if stored in memory (cookie authentication is already automatic)
        });
        
        document.body.addEventListener('htmx:responseError', (event) => {
            window.dispatchEvent(new CustomEvent('toast', {
                detail: { message: 'Request failed. Please try again.', type: 'error' }
            }));
        });
    </script>
</body>
</html>
