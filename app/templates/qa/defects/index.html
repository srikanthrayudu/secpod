{% extends "base.html" %}
{% block title %}Defects - QualityHub{% endblock %}
{% block content %}
<div class="flex h-screen overflow-hidden bg-slate-950 text-slate-100">
    {% include "components/sidebar.html" %}
    <div class="flex-1 flex flex-col overflow-hidden">
        {% include "components/navbar.html" %}
        <main class="flex-1 overflow-y-auto p-6 md:p-8 space-y-6">

            <!-- Header -->
            <div>
                <h1 class="text-2xl font-extrabold text-slate-100">Defects</h1>
                <p class="text-sm text-slate-400 mt-1">Track bugs and their resolution across all releases.</p>
            </div>

            <!-- Filter Bar -->
            <form hx-get="/dashboard/defects" hx-target="#defects-table" hx-swap="innerHTML" class="flex flex-wrap gap-3 items-center">
                <select name="status" class="bg-slate-800 border border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-300 focus:outline-none focus:border-brand-500">
                    <option value="">All Statuses</option>
                    <option value="open" {% if status_filter == 'open' %}selected{% endif %}>Open</option>
                    <option value="triaged" {% if status_filter == 'triaged' %}selected{% endif %}>Triaged</option>
                    <option value="fixed" {% if status_filter == 'fixed' %}selected{% endif %}>Fixed</option>
                    <option value="verified" {% if status_filter == 'verified' %}selected{% endif %}>Verified</option>
                    <option value="closed" {% if status_filter == 'closed' %}selected{% endif %}>Closed</option>
                </select>
                <select name="severity" class="bg-slate-800 border border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-300 focus:outline-none focus:border-brand-500">
                    <option value="">All Severities</option>
                    <option value="critical" {% if severity == 'critical' %}selected{% endif %}>Critical</option>
                    <option value="high" {% if severity == 'high' %}selected{% endif %}>High</option>
                    <option value="medium" {% if severity == 'medium' %}selected{% endif %}>Medium</option>
                    <option value="low" {% if severity == 'low' %}selected{% endif %}>Low</option>
                </select>
                <button type="submit" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 text-slate-200 text-sm font-semibold rounded-xl transition-colors">Filter</button>
            </form>

            <!-- Table -->
            <div class="bg-slate-900 border border-slate-800/60 rounded-2xl overflow-hidden" id="defects-table">
                {% include "qa/defects/table.html" %}
            </div>
        </main>
    </div>
</div>
{% endblock %}
