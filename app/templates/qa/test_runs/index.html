{% extends "base.html" %}
{% block title %}Test Runs - QualityHub{% endblock %}
{% block content %}
<div class="flex h-screen overflow-hidden bg-slate-950 text-slate-100">
    {% include "components/sidebar.html" %}
    <div class="flex-1 flex flex-col overflow-hidden">
        {% include "components/navbar.html" %}
        <main class="flex-1 overflow-y-auto p-6 md:p-8 space-y-6">

            <!-- Header -->
            <div>
                <h1 class="text-2xl font-extrabold text-slate-100">Test Runs</h1>
                <p class="text-sm text-slate-400 mt-1">All manual and automated test execution results.</p>
            </div>

            <!-- Filter Bar -->
            <form hx-get="/dashboard/test-runs" hx-target="#runs-table" hx-swap="innerHTML" class="flex flex-wrap gap-3 items-center">
                <select name="release_id" class="bg-slate-800 border border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-300 focus:outline-none focus:border-brand-500">
                    <option value="">All Releases</option>
                    {% for r in releases %}
                    <option value="{{ r.id }}" {% if release_id == r.id|string %}selected{% endif %}>{{ r.name }}</option>
                    {% endfor %}
                </select>
                <select name="status" class="bg-slate-800 border border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-300 focus:outline-none focus:border-brand-500">
                    <option value="">All Statuses</option>
                    <option value="passed" {% if status_filter == 'passed' %}selected{% endif %}>Passed</option>
                    <option value="failed" {% if status_filter == 'failed' %}selected{% endif %}>Failed</option>
                    <option value="skipped" {% if status_filter == 'skipped' %}selected{% endif %}>Skipped</option>
                    <option value="blocked" {% if status_filter == 'blocked' %}selected{% endif %}>Blocked</option>
                </select>
                <select name="source" class="bg-slate-800 border border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-300 focus:outline-none focus:border-brand-500">
                    <option value="">All Sources</option>
                    <option value="manual" {% if source == 'manual' %}selected{% endif %}>Manual</option>
                    <option value="automated" {% if source == 'automated' %}selected{% endif %}>Automated</option>
                </select>
                <button type="submit" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 text-slate-200 text-sm font-semibold rounded-xl transition-colors">Filter</button>
            </form>

            <!-- Table -->
            <div class="bg-slate-900 border border-slate-800/60 rounded-2xl overflow-hidden" id="runs-table">
                {% include "qa/test_runs/table.html" %}
            </div>
        </main>
    </div>
</div>
{% endblock %}
