<div class="bg-slate-900 border border-slate-800/60 rounded-2xl p-6 space-y-4">
    <div class="flex items-center justify-between">
        <h3 class="text-sm font-bold text-slate-300">Failure Summary — {{ release.name }}</h3>
        <span class="text-[10px] text-slate-500 uppercase tracking-wider">{{ failed_count }} failed runs analyzed</span>
    </div>
    <div>
        <p class="text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Overview</p>
        <p class="text-sm text-slate-300 leading-relaxed">{{ summary.summary }}</p>
    </div>
    {% if summary.themes %}
    <div>
        <p class="text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Identified Themes</p>
        <ul class="space-y-2">
            {% for theme in summary.themes %}
            <li class="flex items-start gap-2 text-sm text-slate-400">
                <span class="text-rose-400 mt-0.5">•</span>
                <span>{{ theme }}</span>
            </li>
            {% endfor %}
        </ul>
    </div>
    {% endif %}
</div>
