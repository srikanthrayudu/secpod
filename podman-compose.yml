version: '3.8'

services:
  postgres:
    image: docker.io/library/postgres:16-alpine
    container_name: startup_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword123
      POSTGRES_DB: startup_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: docker.io/library/redis:7-alpine
    container_name: startup_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: containers/development.Containerfile
    container_name: startup_app
    restart: always
    environment:
      - ENV=development
      - DEBUG=true
      - DATABASE_URL=postgresql+asyncpg://postgres:postgrespassword123@postgres:5432/startup_db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=development_only_secret_key_change_me_in_production
      - DEFAULT_LLM_PROVIDER=mock
    ports:
      - "8000:8000"
    volumes:
      - .:/workspace
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: containers/development.Containerfile
    container_name: startup_worker
    restart: always
    command: celery -A app.background.worker.celery_app worker --loglevel=info
    environment:
      - ENV=development
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+asyncpg://postgres:postgrespassword123@postgres:5432/startup_db
      - SECRET_KEY=development_only_secret_key_change_me_in_production
    volumes:
      - .:/workspace
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
