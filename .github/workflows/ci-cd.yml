name: CI/CD — QualityHub

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:
    branches: ["main", "master"]

env:
  PYTHON_VERSION: "3.14"
  IMAGE_NAME: startup-starter-kit

jobs:
  # ── Phase 1: Quality Gates ────────────────────────────────────────────────
  quality:
    name: 🔍 Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint (Ruff)
        run: ruff check app/ tests/ --output-format=github

  # ── Phase 2: Test Suite ───────────────────────────────────────────────────
  test:
    name: 🧪 Test Suite (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: quality

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run test suite
        env:
          SECRET_KEY: "ci_cd_temporary_secret_key_min_16_chars_for_testing"
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          DEFAULT_LLM_PROVIDER: "mock"
          PYTHONPATH: "."
        run: |
          pip install pytest pytest-asyncio
          pytest -v --tb=short --asyncio-mode=auto

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.python-version }}
          path: .pytest_cache/

  # ── Phase 3: Container Build ──────────────────────────────────────────────
  build:
    name: 🦭 Build Container (Podman)
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Generates a clean 8-character hash for tagging if needed
      - name: Set Short SHA
        run: echo "SHA_SHORT=$(echo ${{ github.sha }} | cut -c1-8)" >> $GITHUB_ENV

      # CHANGED: Using native 'podman build' instead of docker
      - name: Build container image
        run: |
          podman build \
            -f containers/production.Containerfile \
            -t ${{ env.IMAGE_NAME }}:${{ env.SHA_SHORT }} \
            -t ${{ env.IMAGE_NAME }}:latest \
            .
          echo "✅ Container built successfully via Podman"

      # CHANGED: Swapped all 'docker' commands to 'podman'
      - name: Verify container starts
        env:
          SECRET_KEY: "ci_cd_temporary_secret_key_min_16_chars_for_testing"
          DATABASE_URL: "sqlite+aiosqlite:///./sqlite.db"
        run: |
          podman run -d \
            --name test-container \
            -p 8080:8000 \
            -e SECRET_KEY="${SECRET_KEY}" \
            -e DATABASE_URL="${DATABASE_URL}" \
            -e DEFAULT_LLM_PROVIDER="mock" \
            ${{ env.IMAGE_NAME }}:latest
          sleep 5
          curl -sf http://localhost:8080/health || (podman logs test-container && exit 1)
          echo "✅ Health check passed"
          podman stop test-container

  # ── Phase 4: Deploy (optional — configure secrets to enable) ──────────────
  deploy:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && false  # Set to 'true' when ready

    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/startup-kit
            git pull origin main
            podman-compose pull
            podman-compose up -d --remove-orphans
            sleep 5
            curl -sf http://localhost:8000/health && echo "✅ Deployed successfully"